<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — KernelCI Status</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container">
        <div class="status-page-header">
            <img src="/static/kernelci-horizontal-color-1.svg" alt="KernelCI" class="status-logo">
            <h1>{{ title }}</h1>
        </div>

        {% if success %}
        <div class="success-message" style="text-align:center;max-width:500px;margin:2rem auto;">
            {{ message }}
        </div>
        {% else %}
        <div class="error-message" style="text-align:center;max-width:500px;margin:2rem auto;">
            {{ message }}
        </div>
        {% endif %}

        <div style="text-align:center;margin-top:2rem;">
            <a href="/status">View Status Page</a>
        </div>

        <footer class="status-footer">
            <p>&copy; 2026 <a href="https://kernelci.org">KernelCI</a></p>
        </footer>
    </main>
</body>
</html>
