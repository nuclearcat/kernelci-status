<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KernelCI Status{% endblock %}</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <nav class="admin-nav container-fluid">
        <ul>
            <li><a href="/admin"><img src="/static/kernelci-horizontal-color-1.svg" alt="KernelCI" class="nav-logo"></a></li>
        </ul>
        <ul>
            <li><a href="/status">Status</a></li>
            <li><a href="/admin">Dashboard</a></li>
            <li><a href="/admin/endpoints">Endpoints</a></li>
            <li><a href="/admin/maintenance">Maintenance</a></li>
            <li><a href="/admin/incidents">Incidents</a></li>
            <li><a href="/admin/notifications">Notifications</a></li>
            <li><a href="/admin/configuration">Configuration</a></li>
            <li><a href="/admin/users">Users</a></li>
            <li><a href="/admin/history">History</a></li>
            <li><a href="/admin/help">Help</a></li>
            <li>
                <form method="post" action="/logout" style="margin:0">
                    <button type="submit" class="logout-btn">
                        Logout ({% block username %}{% endblock %})
                    </button>
                </form>
            </li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
